name: Pipeline Sistema Bancario

on:
  push:
    branches: [ "master", "main", "desarrollo" ]
  pull_request:
    branches: [ "master", "main", "desarrollo" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 1. Descargar Codigo de C#
      uses: actions/checkout@v4

    - name: 2. Configurar Entorno MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: 3. Configurar Gestor de Paquetes NuGet
      uses: NuGet/setup-nuget@v1.2.0

    - name: 4. Buscar y Restaurar Paquetes de la Solucion
      run: |
        $slnPath = Get-ChildItem -Filter "*.sln" -Recurse | Select-Object -First 1 -ExpandProperty FullName
        Write-Host "Solucion encontrada en: $slnPath"
        nuget restore $slnPath
      shell: powershell

    - name: 5. Instalar Motor de Pruebas via NuGet
      run: nuget install Microsoft.TestPlatform -Version 17.8.0 -OutputDirectory Packages_Test

    - name: 6. Compilar Solucion Completa
      run: |
        $slnPath = Get-ChildItem -Filter "*.sln" -Recurse | Select-Object -First 1 -ExpandProperty FullName
        msbuild $slnPath /p:Configuration=Debug /p:Platform="Any CPU"
      shell: powershell

    - name: 7. Ejecutar Pruebas Unitarias Automatizadas
      run: |
        $dllPath = Get-ChildItem -Path ".*" -Filter "*Test*.dll" -Recurse | Where-Object { $_.FullName -like "*bin\Debug*" } | Select-Object -First 1 -ExpandProperty FullName
        $vstestPath = Get-ChildItem -Path "Packages_Test" -Filter "vstest.console.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
        Write-Host "Ejecutando pruebas sobre: $dllPath"
        & $vstestPath $dllPath
      shell: powershell
